apiVersion: v1
kind: Pod
metadata:
  name: pvc-pod
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - mountPath: /usr/share/nginx/html
      name: storage
  volumes:
  - name: storage
    persistentVolumeClaim:
      claimName: my-pvc
